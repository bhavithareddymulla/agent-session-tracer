<template>
    <lightning-card title="Session Trace Viewer" icon-name="standard:flow">

        <div class="slds-p-around_medium">
            <div class="search-container">
                <lightning-input
                    label="Session ID"
                    value={_sessionId}
                    onchange={handleSessionIdChange}
                    onkeypress={handleKeyPress}
                    placeholder="Enter Session ID or select from browser above"
                    class="session-input"
                ></lightning-input>
                <div class="button-group">
                    <lightning-button variant="brand" label="Search" icon-name="utility:search"
                        onclick={handleSearch} disabled={isLoading}></lightning-button>
                    <lightning-button variant="neutral" label="Clear" icon-name="utility:clear"
                        onclick={handleClear} disabled={isLoading}></lightning-button>
                    <template if:true={hasSessionData}>
                        <lightning-button variant="neutral" label="Export JSON" icon-name="utility:download"
                            onclick={handleExport}></lightning-button>
                    </template>
                </div>
            </div>

            <template if:true={error}>
                <div class="slds-m-top_medium error-banner">
                    <lightning-icon icon-name="utility:error" size="small"></lightning-icon>
                    <span>{error}</span>
                </div>
            </template>

            <template if:true={isLoading}>
                <div class="slds-m-top_large slds-align_absolute-center">
                    <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
                </div>
            </template>
        </div>

        <template if:true={hasSessionData}>

            <!-- Health Banner -->
            <div class={healthBannerClass}>
                <div class="health-stats">
                    <span class="health-stat">
                        <strong>Health:</strong> {healthPct}%
                    </span>
                    <span class="health-stat">
                        <strong>Interactions:</strong> {healthTotal}
                        ({healthActual} actual / {healthReconstructed} reconstructed)
                    </span>
                    <template if:true={hasMissingOutputs}>
                        <span class="health-stat health-warning">
                            <lightning-icon icon-name="utility:warning" size="xx-small" class="warning-icon"></lightning-icon>
                            {healthMissingOutput} missing Output messages
                        </span>
                    </template>
                </div>
            </div>

            <!-- Session Summary -->
            <div class="session-summary slds-m-around_medium">
                <h2 class="slds-text-heading_medium section-heading">
                    <lightning-icon icon-name="standard:metrics" size="small" class="slds-m-right_x-small"></lightning-icon>
                    Session Overview
                </h2>
                <div class="metadata-grid">
                    <template for:each={sessionMetadata} for:item="item">
                        <div key={item.label} class="metadata-item">
                            <div class="metadata-label">{item.label}</div>
                            <div class="metadata-value">{item.value}</div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Interactions -->
            <div class="interactions-section slds-m-around_medium">
                <div class="section-header">
                    <h2 class="slds-text-heading_medium section-heading">
                        <lightning-icon icon-name="standard:flow" size="small" class="slds-m-right_x-small"></lightning-icon>
                        Interactions
                    </h2>
                    <div class="button-group-small">
                        <lightning-button label="Expand All" onclick={expandAllInteractions} variant="neutral"></lightning-button>
                        <lightning-button label="Collapse All" onclick={collapseAllInteractions} variant="neutral"></lightning-button>
                    </div>
                </div>

                <template for:each={interactionsWithSteps} for:item="interaction">
                    <div key={interaction.interactionId} class="interaction-card">

                        <!-- Interaction Header -->
                        <div class="interaction-header" data-id={interaction.interactionId} onclick={toggleInteraction}>
                            <div class="interaction-title-section">
                                <lightning-icon icon-name={interaction.chevronIcon} size="x-small" class="chevron-icon"></lightning-icon>
                                <span class="interaction-index">#{interaction.index}</span>
                                <span class={interaction.interactionTypeBadge}>{interaction.interactionType}</span>
                                <template if:true={interaction.topicApiName}>
                                    <span class="topic-badge">{interaction.topicApiName}</span>
                                </template>
                                <template if:false={interaction.hasActualRecord}>
                                    <span class="reconstructed-badge">Reconstructed</span>
                                </template>
                                <template if:true={interaction.missingOutput}>
                                    <span class="missing-output-badge">Missing Output</span>
                                </template>
                            </div>
                            <div class="interaction-meta">
                                <template if:true={interaction.hasActions}>
                                    <lightning-button-icon
                                        icon-name="utility:filter"
                                        variant={interaction.filterButtonVariant}
                                        alternative-text="Filter Actions"
                                        title="Show Actions Only"
                                        data-interaction-id={interaction.interactionId}
                                        onclick={toggleActionsFilter}
                                    ></lightning-button-icon>
                                    <span class="action-count-badge">{interaction.actionStepCount} actions</span>
                                </template>
                                <span class="duration-badge">{interaction.durationFormatted}</span>
                                <span class="step-count-badge">{interaction.stepCount} steps</span>
                            </div>
                        </div>

                        <!-- Interaction Details -->
                        <template if:true={interaction.isExpanded}>
                            <div class="interaction-details">

                                <!-- Messages -->
                                <template if:true={interaction.hasMessages}>
                                    <div class="messages-section">
                                        <div class="messages-header">
                                            <lightning-icon icon-name="standard:messaging_conversation" size="x-small"></lightning-icon>
                                            <span class="slds-m-left_x-small">Conversation ({interaction.messageCount} messages)</span>
                                        </div>
                                        <div class="messages-container">
                                            <template for:each={interaction.messages} for:item="message">
                                                <div key={message.messageId} class={message.bubbleClass}>
                                                    <div class="message-header">
                                                        <lightning-icon icon-name={message.messageIcon} size="xx-small"></lightning-icon>
                                                        <span class="message-type">{message.messageType}</span>
                                                        <span class="message-time">{message.sentTimeFormatted}</span>
                                                    </div>
                                                    <div class="message-content">
                                                        <template if:false={message.isLong}>
                                                            <lightning-formatted-text value={message.contentText}></lightning-formatted-text>
                                                        </template>
                                                        <template if:true={message.isLong}>
                                                            <lightning-formatted-text value={message.preview}></lightning-formatted-text>
                                                            <a class="show-more-link" data-message-id={message.messageId}
                                                                data-interaction-id={message.interactionId} onclick={showFullMessage}>Show More</a>
                                                        </template>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>

                                <!-- Steps -->
                                <div class="steps-container">
                                    <template for:each={interaction.steps} for:item="step">
                                        <div key={step.stepId} class="step-card">
                                            <div class="step-header" data-id={step.stepId} onclick={toggleStep}>
                                                <div class="step-title-section">
                                                    <lightning-icon icon-name={step.chevronIcon} size="xx-small" class="step-chevron"></lightning-icon>
                                                    <span class={step.stepTypeClass}>{step.stepTypeLabel}</span>
                                                    <span class="step-name">{step.name}</span>
                                                </div>
                                                <span class="step-duration">{step.durationFormatted}</span>
                                            </div>

                                            <template if:true={step.isExpanded}>
                                                <div class="step-details">
                                                    <div class="step-times">
                                                        <lightning-icon icon-name="utility:clock" size="xx-small"></lightning-icon>
                                                        <span class="slds-m-left_xx-small">{step.startTimeFormatted} → {step.endTimeFormatted}</span>
                                                    </div>

                                                    <template if:true={step.hasError}>
                                                        <div class="step-error-banner">
                                                            <lightning-icon icon-name="utility:error" size="x-small"></lightning-icon>
                                                            <strong>Error:</strong> {step.errorMessage}
                                                        </div>
                                                    </template>

                                                    <template if:true={step.isActionStep}>
                                                        <template if:true={step.actionDetails.apiInfo}>
                                                            <div class="action-api-info">
                                                                <strong>Status:</strong> {step.actionDetails.apiInfo.statusCode}
                                                                — {step.actionDetails.apiInfo.statusDescription}
                                                            </div>
                                                        </template>
                                                    </template>

                                                    <template if:true={step.hasInput}>
                                                        <div class="step-io-section">
                                                            <div class="io-header input-header">Input</div>
                                                            <div class="io-content">
                                                                <lightning-formatted-text value={step.inputValueText}></lightning-formatted-text>
                                                                <template if:true={step.hasMoreInput}>
                                                                    <div class="truncate-notice">Truncated at 5000 chars</div>
                                                                </template>
                                                            </div>
                                                        </div>
                                                    </template>

                                                    <template if:true={step.hasOutput}>
                                                        <div class="step-io-section">
                                                            <div class="io-header output-header">Output</div>
                                                            <div class="io-content">
                                                                <lightning-formatted-text value={step.outputValueText}></lightning-formatted-text>
                                                                <template if:true={step.hasMoreOutput}>
                                                                    <div class="truncate-notice">Truncated at 5000 chars</div>
                                                                </template>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </template>
    </lightning-card>

    <!-- Full Message Modal -->
    <template if:true={showMessageModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        title="Close" onclick={closeMessageModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                    </button>
                    <h2 class="slds-modal__title">{selectedMessage.modalTitle}</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <div class="modal-meta">
                        <span><strong>Message ID:</strong> {selectedMessage.messageId}</span>
                        <span><strong>Type:</strong> {selectedMessage.messageType}</span>
                        <span><strong>Sent:</strong> {selectedMessage.sentTimeFormatted}</span>
                    </div>
                    <div class="modal-message-text">
                        <lightning-formatted-text value={selectedMessage.fullText}></lightning-formatted-text>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button variant="neutral" label="Close" onclick={closeMessageModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
