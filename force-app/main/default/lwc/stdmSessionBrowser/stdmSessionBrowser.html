<template>
    <lightning-card title="Session Browser" icon-name="standard:search">
        <div class="slds-p-around_medium">
            <div class="filter-container">
                <div class="filter-item agent-selector">
                    <lightning-combobox
                        name="agent"
                        label="Select Agent"
                        value={selectedAgent}
                        placeholder="Choose an agent..."
                        options={agentOptions}
                        onchange={handleAgentChange}
                        required
                    ></lightning-combobox>
                </div>

                <div class="filter-item">
                    <lightning-input
                        type="date"
                        name="startDate"
                        label="Start Date"
                        value={startDate}
                        onchange={handleStartDateChange}
                    ></lightning-input>
                </div>

                <div class="filter-item">
                    <lightning-input
                        type="date"
                        name="endDate"
                        label="End Date"
                        value={endDate}
                        onchange={handleEndDateChange}
                    ></lightning-input>
                </div>

                <div class="filter-item button-group">
                    <lightning-button
                        variant="brand"
                        label="Search"
                        icon-name="utility:search"
                        onclick={handleSearch}
                        disabled={isLoading}
                    ></lightning-button>
                    <lightning-button
                        variant="neutral"
                        label="Clear"
                        icon-name="utility:clear"
                        onclick={handleClear}
                        disabled={isLoading}
                    ></lightning-button>
                </div>
            </div>

            <template if:true={error}>
                <div class="slds-m-top_medium">
                    <div class="error-banner">
                        <lightning-icon icon-name="utility:error" size="small"></lightning-icon>
                        <span>{error}</span>
                    </div>
                </div>
            </template>

            <template if:true={isLoading}>
                <div class="slds-m-top_large slds-align_absolute-center">
                    <lightning-spinner alternative-text="Loading sessions..." size="medium"></lightning-spinner>
                </div>
            </template>
        </div>

        <template if:true={hasSessions}>
            <div class="results-section">
                <div class="results-header">
                    <lightning-icon icon-name="standard:data_streams" size="small"></lightning-icon>
                    <span class="results-title">Found {sessionCount} Sessions</span>
                </div>
                <div class="table-container">
                    <lightning-datatable
                        key-field="sessionId"
                        data={sessions}
                        columns={tableColumns}
                        hide-checkbox-column
                        onrowaction={handleRowAction}
                    ></lightning-datatable>
                </div>
            </div>
        </template>
    </lightning-card>
</template>
